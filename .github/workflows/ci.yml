name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and regression tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: File size rules
        working-directory: .
        run: node scripts/check-file-size.mjs

      - name: Dependency audit
        run: npm audit --audit-level=high

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache-dependency-path: backend/go.sum

      - name: Unit and regression tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: SAST
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G404 ./...

  compose:
    name: Compose and Docker
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose config

      - name: Build images
        run: docker compose build web api migrate

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.34.0
        with:
          image-ref: bludm-api:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.34.0
        with:
          image-ref: bludm-web:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Smoke test stack
        run: |
          docker compose up -d postgres api web
          timeout 90 bash -c 'until curl -fsS http://localhost:3080/health; do sleep 2; done'
          timeout 90 bash -c 'until curl -fsS http://localhost:3080/api/health; do sleep 2; done'

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v

  security:
    name: Free Security Scans
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - name: Secret scan
        run: |
          go install github.com/gitleaks/gitleaks/v8@latest
          gitleaks detect --source . --redact --no-banner

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Semgrep OSS scan
        run: |
          python -m pip install --upgrade pip semgrep
          semgrep scan --config p/default --error

  portainer:
    name: Notify Portainer
    runs-on: ubuntu-latest
    needs: [compose, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
    steps:
      - name: Trigger Portainer webhook
        if: env.PORTAINER_WEBHOOK_URL != ''
        run: curl -fsS -X POST "$PORTAINER_WEBHOOK_URL"

      - name: Skip deploy notification
        if: env.PORTAINER_WEBHOOK_URL == ''
        run: echo "PORTAINER_WEBHOOK_URL is not configured; Portainer Git polling can still pick up main."
